# Self-contained n8n lab stack (compare with repo root `n8n/docker-compose.yml`, which uses host networking).
# Postgres is internal-only; only n8n publishes a port.

services:
  postgres:
    image: postgres:15-alpine
    container_name: lab25-n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8npassword
      POSTGRES_DB: n8n
    volumes:
      - lab25_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: lab25-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8npassword

      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production

      # Merge JSON overrides (telemetry off, etc.) — see config/n8n.lab.json
      - N8N_CONFIG_FILES=/etc/n8n-config/n8n.lab.json

      # Must stay stable for a given ./n8n_data volume or credentials cannot be decrypted
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-lab25_change_me_to_a_long_random_string_at_least_32_chars}

      # First-time setup uses the UI; cookies work over plain HTTP on localhost
      - N8N_SECURE_COOKIE=false
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./config/n8n.lab.json:/etc/n8n-config/n8n.lab.json:ro
      - ./workflows/seed:/seed/workflows:ro
      - ./docker/n8n-entrypoint.sh:/custom/n8n-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/custom/n8n-entrypoint.sh"]

volumes:
  lab25_pg_data:
