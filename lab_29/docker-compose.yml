services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: labdb
      POSTGRES_USER: labuser
      POSTGRES_PASSWORD: labpassword
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labuser -d labdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: labdb
      DB_USER: labuser
      DB_PASSWORD: labpassword
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "8020:80"
    depends_on:
      - api

volumes:
  pgdata:
